<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AboutIAM | The Interactive Identity Workspace</title>
    <meta name="description" content="AboutIAM is an open-source, 100% client-side academy and simulation workbench for Identity and Access Management. Deconstruct OAuth/OIDC, SAML, and JWT, debug FIDO2/WebAuthn, and test Zero Trust policies, entirely in your browser." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Mayank Raj Jaiswal" />
    <link rel="canonical" href="https://www.aboutiam.com/" />

    <!-- CSP is the primary defense-in-depth control here: GitHub Pages serves no
         custom HTTP headers, so this meta tag is the only enforcement mechanism.
         connect-src 'none' blocks any outbound network call in the browser, so a
         compromised dependency cannot exfiltrate user-pasted secrets.
         frame-ancestors is intentionally omitted: the CSP spec has browsers ignore
         it when delivered via <meta> (only an HTTP header can enforce it), and
         GitHub Pages cannot serve custom headers, so including it here would only
         produce a console warning with zero actual protection. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'none'; base-uri 'self'; form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Best-effort hint against long-lived caching of this HTML shell; GitHub Pages exposes no
         real Cache-Control header control, so a stale cached copy is recovered by the script below. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="mask-icon" href="/favicon.svg" color="#3b82f6" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#070a13" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AboutIAM" />
    <meta property="og:title" content="AboutIAM | The Interactive Identity Workspace" />
    <meta property="og:description" content="Open-source, browser-native academy and simulation playground for Identity and Access Management &mdash; OAuth, SAML, JWT, FIDO2, Zero Trust, and more." />
    <meta property="og:url" content="https://www.aboutiam.com/" />
    <meta property="og:image" content="https://www.aboutiam.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AboutIAM &mdash; The Interactive Identity Workspace" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AboutIAM | The Interactive Identity Workspace" />
    <meta name="twitter:description" content="Open-source, browser-native academy and simulation playground for Identity and Access Management &mdash; OAuth, SAML, JWT, FIDO2, Zero Trust, and more." />
    <meta name="twitter:image" content="https://www.aboutiam.com/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "AboutIAM",
            "url": "https://www.aboutiam.com/",
            "description": "Open-source, 100% client-side academy and simulation workbench for Identity and Access Management.",
            "inLanguage": "en",
            "license": "https://github.com/mayankrajjaiswal/aboutiam/blob/main/LICENSE"
          },
          {
            "@type": "Organization",
            "name": "AboutIAM",
            "url": "https://www.aboutiam.com/",
            "logo": "https://www.aboutiam.com/pwa-512.png",
            "founder": {
              "@type": "Person",
              "name": "Mayank Raj Jaiswal"
            },
            "sameAs": [
              "https://github.com/mayankrajjaiswal/aboutiam"
            ]
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Self-heal a stale cached HTML shell: after a deploy, GitHub Pages atomically
      // replaces the previous build, so an old cached page's hashed asset URLs 404.
      // Recover with a single cache-busted reload instead of leaving a blank page.
      (function () {
        var RELOAD_GUARD_KEY = 'aboutiam:asset-reload-attempted';
        window.addEventListener(
          'error',
          function (event) {
            var target = event.target;
            if (
              target === window ||
              !(target instanceof HTMLScriptElement || target instanceof HTMLLinkElement)
            ) {
              return;
            }
            if (sessionStorage.getItem(RELOAD_GUARD_KEY)) {
              return;
            }
            sessionStorage.setItem(RELOAD_GUARD_KEY, '1');
            var url = new URL(window.location.href);
            url.searchParams.set('_r', Date.now().toString(36));
            window.location.replace(url.toString());
          },
          true
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
