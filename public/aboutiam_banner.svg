<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" style="background: linear-gradient(135deg, #070a13 0%, #0d1222 100%); border-radius: 16px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Grid background lines for a subtle tech look -->
  <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200 M 0,240 L 800,240 M 0,280 L 800,280" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 80,0 L 80,320 M 160,0 L 160,320 M 240,0 L 240,320 M 320,0 L 320,320 M 400,0 L 400,320 M 480,0 L 480,320 M 560,0 L 560,320 M 640,0 L 640,320 M 720,0 L 720,320" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Glowing background blurs behind the lock -->
  <circle cx="160" cy="160" r="80" fill="#3b82f6" opacity="0.15" filter="blur(40px)" />
  <circle cx="480" cy="160" r="100" fill="#14b8a6" opacity="0.1" filter="blur(50px)" />

  <!-- Cryptographic Padlock Vector -->
  <g transform="translate(100, 100)">
    <!-- Shackle -->
    <path d="M 25,60 L 25,40 C 25,20, 55,20, 55,40 L 55,60" fill="none" stroke="#d97706" stroke-width="8" stroke-linecap="round" />
    <path d="M 25,60 L 25,40 C 25,20, 55,20, 55,40 L 55,60" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" />
    <!-- Body -->
    <rect x="10" y="55" width="60" height="50" rx="10" fill="linear-gradient(135deg, #1e293b 0%, #0f172a 100%)" stroke="#3b82f6" stroke-width="2.5" />
    <rect x="15" y="60" width="50" height="40" rx="6" fill="#0d1222" opacity="0.6" />
    <!-- Keyhole -->
    <circle cx="40" cy="76" r="6" fill="#f59e0b" />
    <path d="M 37,76 L 43,76 L 45,94 L 35,94 Z" fill="#f59e0b" />
  </g>

  <!-- Title Text -->
  <g transform="translate(240, 140)">
    <text x="0" y="0" fill="#f8fafc" font-size="44" font-weight="900" letter-spacing="1">
      About<tspan fill="#3b82f6">IAM</tspan>
    </text>
    <!-- Glowing text shadow effect -->
    <text x="0" y="0" fill="#3b82f6" font-size="44" font-weight="900" letter-spacing="1" opacity="0.3" filter="blur(4px)">
      AboutIAM
    </text>
    
    <text x="0" y="32" fill="#94a3b8" font-size="16" font-weight="bold" letter-spacing="0.5">
      The Interactive Client-Side Identity Workspace
    </text>
  </g>

  <!-- Technology Badges -->
  <g transform="translate(240, 215)">
    <!-- Badge 1: React 19 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="80" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" />
      <text x="40" y="15" fill="#3b82f6" font-size="10" font-weight="bold" text-anchor="middle">React 19</text>
    </g>
    <!-- Badge 2: TS -->
    <g transform="translate(90, 0)">
      <rect x="0" y="0" width="85" height="24" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1" />
      <text x="42.5" y="15" fill="#3b82f6" font-size="10" font-weight="bold" text-anchor="middle">TypeScript</text>
    </g>
    <!-- Badge 3: Tailwind v4 -->
    <g transform="translate(185, 0)">
      <rect x="0" y="0" width="90" height="24" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="1" />
      <text x="45" y="15" fill="#14b8a6" font-size="10" font-weight="bold" text-anchor="middle">Tailwind v4</text>
    </g>
    <!-- Badge 4: Zustand -->
    <g transform="translate(285, 0)">
      <rect x="0" y="0" width="80" height="24" rx="6" fill="#1e293b" stroke="#14b8a6" stroke-width="1" />
      <text x="40" y="15" fill="#14b8a6" font-size="10" font-weight="bold" text-anchor="middle">Zustand</text>
    </g>
    <!-- Badge 5: MIT -->
    <g transform="translate(375, 0)">
      <rect x="0" y="0" width="70" height="24" rx="6" fill="#1e293b" stroke="#d97706" stroke-width="1" />
      <text x="35" y="15" fill="#d97706" font-size="10" font-weight="bold" text-anchor="middle">MIT</text>
    </g>
  </g>
</svg>
